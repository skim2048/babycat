<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Babycat Debug</title>
<style>
/* ── Theme Tokens ── */
:root {
  color-scheme: light dark;
  --bg-page: #f0f1f4; --bg-surface: #fff; --bg-surface-secondary: #f6f7f9;
  --bg-surface-hover: #ecedf1; --bg-surface-active: #e2e3e8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --border: #d8dae0; --border-accent: #cccfd6; --border-input: #b8bcc6; --border-subtle: #e8e9ee;
  --radius: 8px;
  --text-1: #1a1c24; --text-2: #4a4d58; --text-3: #7c7f8c; --text-4: #a0a3b0;
  --accent: #3b82d6; --accent-bg: #e0edfb; --accent-shadow: rgba(59,130,214,0.25);
  --success: #16864a; --success-bg: #e6f7ee; --success-border: #9dd4b4; --success-hover: #ccecda;
  --danger: #d03838; --danger-bg: #fde8e8; --danger-border: #eba8a8; --danger-bg-soft: #fef4f4;
  --warning: #a07a00; --warning-bg: #fdf5dc;
  --bar-bg: #dddee4; --bar-cpu: #3b82d6; --bar-ram: #d09540; --bar-gpu: #2aa858;
  --input-bg: #fff; --scrollbar: #c0c3cc;
  --clip-bg: #0c0c10; --clip-bar: #161620; --clip-text: #b0b0bc; --clip-text-hi: #fff;
  --clip-progress: #3a3a48; --clip-meta: #808090;
  --overlay: rgba(0,0,0,0.35); --play-icon-bg: rgba(255,255,255,0.92); --play-icon-arrow: #1a1c24;
  --font-ui: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --font-mono: 'SF Mono','Cascadia Code','Fira Code','Consolas','Courier New',monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-page: #0e1018; --bg-surface: #181a28; --bg-surface-secondary: #1e2134;
    --bg-surface-hover: #262a40; --bg-surface-active: #2e3350;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.25); --shadow-md: 0 2px 8px rgba(0,0,0,0.35);
    --border: #282c3e; --border-accent: #282c3e; --border-input: #363b54; --border-subtle: #1e2134;
    --text-1: #e0e2ec; --text-2: #9498b0; --text-3: #666880; --text-4: #484a60;
    --accent: #6cb6ff; --accent-bg: rgba(108,182,255,0.10); --accent-shadow: rgba(108,182,255,0.20);
    --success: #3ddc84; --success-bg: rgba(61,220,132,0.07); --success-border: rgba(61,220,132,0.22); --success-hover: rgba(61,220,132,0.14);
    --danger: #ff6b6b; --danger-bg: rgba(255,107,107,0.07); --danger-border: rgba(255,107,107,0.22); --danger-bg-soft: rgba(255,107,107,0.04);
    --warning: #ffd866; --warning-bg: rgba(255,216,102,0.07);
    --bar-bg: #282c3e; --bar-cpu: #6cb6ff; --bar-ram: #ffc777; --bar-gpu: #3ddc84;
    --input-bg: #141622; --scrollbar: #363b54;
    --clip-bg: #08080e; --clip-bar: #10111c; --clip-text: #9498b0; --clip-text-hi: #e0e2ec;
    --clip-progress: #282c3e; --clip-meta: #585a70;
    --overlay: rgba(0,0,0,0.50); --play-icon-bg: rgba(255,255,255,0.88); --play-icon-arrow: #0e1018;
  }
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-ui); background: var(--bg-page); color: var(--text-1);
       line-height: 1.5; -webkit-font-smoothing: antialiased; }
.header { background: var(--bg-surface); padding: 12px 24px; border-bottom: 1px solid var(--border);
          box-shadow: var(--shadow-sm); display: flex; justify-content: space-between; align-items: center;
          position: relative; z-index: 10; }
.header h1 { font-size: 15px; font-weight: 700; color: var(--success); letter-spacing: 0.02em; }
.header .uptime { font-family: var(--font-mono); font-size: 12px; color: var(--text-3); }
.main { display: flex; height: calc(100vh - 49px); }
.video-area { flex: 1; min-width: 0; padding: 16px; display: flex; flex-direction: column; gap: 12px;
              overflow: hidden; }
.video-box { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.video-box video { flex: 1; min-height: 0; width: 100%; object-fit: contain;
                   border: 1px solid var(--border); background: #000; border-radius: var(--radius);
                   box-shadow: var(--shadow-md); }
.video-label { font-size: 10px; color: var(--text-3); font-weight: 700;
               text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; flex-shrink: 0; }
.dash { width: 360px; flex-shrink: 0; overflow-y: auto; border-left: 1px solid var(--border);
        padding: 16px; display: flex; flex-direction: column; gap: 12px;
        background: var(--bg-surface-secondary); }
.dash::-webkit-scrollbar { width: 6px; }
.dash::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

.section { background: var(--bg-surface); border-radius: var(--radius); border: 1px solid var(--border-accent);
           box-shadow: var(--shadow-sm); overflow: visible; }
.section-title { font-size: 10px; color: var(--text-3); font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  padding: 10px 14px; cursor: pointer; user-select: none;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg-surface-secondary); border-bottom: 1px solid var(--border-accent);
  border-radius: var(--radius) var(--radius) 0 0; transition: background 0.15s; }
.section-title:hover { background: var(--bg-surface-hover); }
.section-title .arrow { font-size: 9px; color: var(--text-4); transition: transform 0.2s ease; }
.section.collapsed .section-title { border-bottom-color: transparent; border-radius: var(--radius); }
.section.collapsed .section-title .arrow { transform: rotate(-90deg); }
.section-body { padding: 14px; }
.section.collapsed .section-body { display: none; }

.row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; }
.row .k { font-size: 12px; color: var(--text-3); font-weight: 500; }
.row .v { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--text-1); }
.infer-img { width: 100%; display: block; border: 1px solid var(--border); background: #000;
             border-radius: var(--radius); }
.result-box { padding: 10px 12px; border-radius: var(--radius); margin-top: 8px; }
.result-box.normal { background: var(--success-bg); border: 1px solid var(--success-border);
                     border-left: 3px solid var(--success); }
.result-box.alert  { background: var(--danger-bg); border: 1px solid var(--danger-border);
                     border-left: 3px solid var(--danger); }
.result-label { font-size: 20px; font-weight: 700; }
.result-label.normal { color: var(--success); }
.result-label.alert  { color: var(--danger); }
.result-raw { font-family: var(--font-mono); font-size: 13px; font-weight: 500;
              color: var(--text-1); margin-top: 4px; line-height: 1.6; }
.bar-bg { height: 8px; background: var(--bar-bg); border-radius: 4px; margin-top: 4px; overflow: hidden; }
.bar-fg { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); }
.bar-cpu .bar-fg { background: var(--bar-cpu); }
.bar-ram .bar-fg { background: var(--bar-ram); }
.bar-gpu .bar-fg { background: var(--bar-gpu); }
.temp { display: inline-block; padding: 3px 8px; border-radius: 4px;
        font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
.temp.cool { background: var(--success-bg); color: var(--success); }
.temp.warm { background: var(--warning-bg); color: var(--warning); }
.temp.hot  { background: var(--danger-bg);  color: var(--danger); }

.prompt-row { display: flex; gap: 8px; flex-shrink: 0; }
.prompt-fields { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.prompt-input { width: 100%; font-family: var(--font-mono); font-size: 13px;
                padding: 8px 12px; border: 1px solid var(--border-input); border-radius: var(--radius);
                outline: none; background: var(--input-bg); color: var(--text-1);
                transition: border-color 0.15s, box-shadow 0.15s; }
.prompt-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-shadow); }
.prompt-btn { padding: 8px 18px; font-size: 13px; font-weight: 600;
              border: 1px solid var(--success-border); background: var(--success-bg); color: var(--success);
              border-radius: var(--radius); cursor: pointer; white-space: nowrap; align-self: stretch;
              transition: background 0.15s, box-shadow 0.15s; }
.prompt-btn:hover { background: var(--success-hover); box-shadow: var(--shadow-sm); }
.prompt-btn:active { transform: translateY(1px); }

.clip-sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid var(--border);
                padding: 16px; display: flex; flex-direction: column; gap: 10px;
                overflow: hidden; background: var(--bg-surface-secondary); }
.clip-sidebar .video-label { flex-shrink: 0; }
.clip-toolbar { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.clip-search { flex: 1; min-width: 80px; font-family: var(--font-ui); font-size: 12px;
               padding: 6px 10px; border: 1px solid var(--border-input); border-radius: var(--radius);
               outline: none; background: var(--input-bg); color: var(--text-1);
               transition: border-color 0.15s, box-shadow 0.15s; }
.clip-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-shadow); }
.clip-action-btn { font-size: 11px; padding: 5px 10px; border-radius: var(--radius);
                   border: 1px solid var(--border-input); background: var(--bg-surface);
                   color: var(--text-2); cursor: pointer; white-space: nowrap;
                   font-weight: 500; transition: background 0.15s; }
.clip-action-btn:hover { background: var(--bg-surface-hover); }
.clip-action-btn.danger { border-color: var(--danger-border); color: var(--danger); }
.clip-action-btn.danger:hover { background: var(--danger-bg); }
.clip-action-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
.clip-gallery { flex: 1; display: flex; flex-direction: column; gap: 10px;
                overflow-y: auto; padding: 2px 0; }
.clip-gallery::-webkit-scrollbar { width: 6px; }
.clip-gallery::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
.clip-item { flex-shrink: 0; background: var(--clip-bg); border-radius: var(--radius);
             overflow: hidden; border: 1px solid var(--border); position: relative;
             box-shadow: var(--shadow-sm); transition: border-color 0.15s, box-shadow 0.15s; }
.clip-item:hover { box-shadow: var(--shadow-md); }
.clip-item.checked { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-shadow); }
.clip-item.hidden { display: none; }
.clip-top-bar { display: flex; align-items: center; justify-content: space-between;
                padding: 4px 8px; background: var(--clip-bar); }
.clip-chk { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }
.clip-del-btn { background: none; border: none; color: var(--clip-meta); font-size: 14px;
                cursor: pointer; padding: 2px 4px; line-height: 1; border-radius: 4px;
                transition: color 0.15s, background 0.15s; }
.clip-del-btn:hover { color: var(--danger); background: rgba(255,107,107,0.1); }
.clip-video-wrap { position: relative; width: 100%; cursor: pointer; }
.clip-video-wrap video { width: 100%; display: block; }
.clip-overlay { position: absolute; inset: 0; display: flex; align-items: center;
                justify-content: center; background: var(--overlay);
                transition: opacity 0.2s; pointer-events: none; }
.clip-overlay.hidden { opacity: 0; }
.clip-play-icon { width: 40px; height: 40px; background: var(--play-icon-bg);
                  border-radius: 50%; display: flex; align-items: center; justify-content: center;
                  box-shadow: 0 2px 8px rgba(0,0,0,0.2); transition: transform 0.15s; }
.clip-video-wrap:hover .clip-play-icon { transform: scale(1.08); }
.clip-play-icon::after { content: ""; display: block; width: 0; height: 0;
                         border-style: solid; border-width: 8px 0 8px 14px;
                         border-color: transparent transparent transparent var(--play-icon-arrow);
                         margin-left: 3px; }
.clip-controls { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
                 background: var(--clip-bar); }
.clip-ctrl-btn { background: none; border: none; color: var(--clip-text); font-size: 14px;
                 cursor: pointer; padding: 2px; line-height: 1; transition: color 0.15s; }
.clip-ctrl-btn:hover { color: var(--clip-text-hi); }
.clip-progress { flex: 1; height: 4px; background: var(--clip-progress); border-radius: 2px;
                 cursor: pointer; position: relative; overflow: hidden; }
.clip-progress-bar { height: 100%; background: var(--accent); border-radius: 2px;
                     width: 0%; pointer-events: none; transition: width 0.1s linear; }
.clip-time { font-size: 10px; color: var(--clip-meta); font-family: var(--font-mono);
             white-space: nowrap; }
.clip-info { padding: 5px 10px 7px; background: var(--clip-bar); }
.clip-name { font-size: 10px; color: var(--clip-meta); overflow: hidden;
             text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono); }
.clip-empty { font-size: 12px; color: var(--text-4); padding: 24px 0; text-align: center; }

.ptz-grid { display: grid; grid-template-columns: repeat(3, 52px);
            grid-template-rows: repeat(3, 52px); gap: 5px;
            justify-content: center; margin: 10px 0; }
.ptz-btn { width: 52px; height: 52px; border-radius: var(--radius);
           border: 1px solid var(--border-input); background: var(--bg-surface-secondary);
           color: var(--text-1);
           font-size: 18px; cursor: pointer; user-select: none;
           display: flex; align-items: center; justify-content: center;
           transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
           -webkit-tap-highlight-color: transparent; }
.ptz-btn:hover { background: var(--bg-surface-hover); box-shadow: var(--shadow-sm); }
.ptz-btn:active, .ptz-btn.pressing { background: var(--accent-bg); border-color: var(--accent);
                                     box-shadow: 0 0 0 3px var(--accent-shadow); }
.ptz-btn.stop { background: var(--danger-bg-soft); border-color: var(--danger-border);
                font-size: 14px; color: var(--danger); }
.ptz-btn.stop:hover { background: var(--danger-bg); }
.ptz-info { font-size: 12px; color: var(--text-3); margin: 8px 0 2px; }
.ptz-info span { font-family: var(--font-mono); font-weight: 600; color: var(--text-1); }
.ptz-saved-row { display: flex; align-items: center; gap: 8px; margin-top: 10px;
                 padding-top: 10px; border-top: 1px solid var(--border-subtle); }
.ptz-saved-val { font-size: 12px; color: var(--text-3); flex: 1; }
.ptz-saved-val span { font-family: var(--font-mono); font-weight: 600; color: var(--text-1); }
.ptz-action-btn { font-size: 11px; padding: 6px 12px; border-radius: var(--radius);
                  border: 1px solid var(--border-input); background: var(--bg-surface);
                  color: var(--text-2); cursor: pointer; white-space: nowrap;
                  font-weight: 500; transition: background 0.15s, box-shadow 0.15s; }
.ptz-action-btn:hover { background: var(--bg-surface-hover); box-shadow: var(--shadow-sm); }
.ptz-action-btn.go { background: var(--success-bg); border-color: var(--success-border); color: var(--success); }
.ptz-action-btn.go:hover { background: var(--success-hover); }
.ptz-status-txt { font-size: 11px; color: var(--text-4); text-align: center; margin-top: 8px; font-weight: 500; }

</style>
</head>
<body>
<div class="header">
  <h1>Babycat Backend Debug</h1>
  <span class="uptime" id="v-uptime">-</span>
</div>
<div class="main">
  <div class="clip-sidebar">
    <div class="video-label">Event Clips</div>
    <div class="clip-toolbar">
      <input type="text" class="clip-search" id="clip-search" placeholder="검색..." />
      <button class="clip-action-btn danger" id="btn-clip-del-sel" disabled>선택 삭제</button>
      <button class="clip-action-btn danger" id="btn-clip-del-all">모두 삭제</button>
    </div>
    <div class="clip-gallery" id="clip-gallery">
      <div class="clip-empty">녹화된 클립 없음</div>
    </div>
  </div>
  <div class="video-area">
    <div class="video-box">
      <div class="video-label">Live Stream</div>
      <video id="live-stream" autoplay muted playsinline></video>
    </div>
    <div class="video-label">Prompting</div>
    <div class="prompt-row">
      <div class="prompt-fields">
        <input type="text" class="prompt-input" id="prompt-input" placeholder="VLM 프롬프트 입력..." />
        <input type="text" class="prompt-input" id="trigger-input" placeholder="이벤트 트리거 키워드 (쉼표 구분)" />
      </div>
      <button class="prompt-btn" id="btn-apply-prompt">적용</button>
    </div>
  </div>
  <div class="dash">

    <!-- Inference -->
    <div class="section" id="sec-inference">
      <div class="section-title" onclick="toggleSection('sec-inference')">
        Inference <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <img class="infer-img" id="stream" alt="VLM input" />
        <div class="result-box normal" id="result-box" style="margin-top:8px;">
          <div class="result-raw" id="v-raw"></div>
        </div>
        <div style="margin-top:8px;">
          <div class="row">
            <span class="k">추론 당 소요 시간</span>
            <span class="v" id="v-infer-time">-</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Pipeline -->
    <div class="section" id="sec-pipeline">
      <div class="section-title" onclick="toggleSection('sec-pipeline')">
        Pipeline <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <div class="row">
          <span class="k">원본 해상도</span>
          <span class="v" id="v-resolution">-</span>
        </div>
        <div class="row">
          <span class="k">N_FRAMES</span>
          <span class="v" id="v-nframes">-</span>
        </div>
      </div>
    </div>

    <!-- Hardware -->
    <div class="section" id="sec-hardware">
      <div class="section-title" onclick="toggleSection('sec-hardware')">
        Hardware <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <div class="row">
          <span class="k">CPU</span>
          <span class="v" id="v-cpu">0%</span>
        </div>
        <div class="bar-bg bar-cpu"><div class="bar-fg" id="bar-cpu" style="width:0%"></div></div>
        <div class="row" style="margin-top:8px;">
          <span class="k">RAM</span>
          <span class="v" id="v-ram">0 / 0 MB</span>
        </div>
        <div class="bar-bg bar-ram"><div class="bar-fg" id="bar-ram" style="width:0%"></div></div>
        <div class="row" style="margin-top:8px;">
          <span class="k">GPU</span>
          <span class="v" id="v-gpu">0%</span>
        </div>
        <div class="bar-bg bar-gpu"><div class="bar-fg" id="bar-gpu" style="width:0%"></div></div>
        <div class="row" style="margin-top:10px;">
          <span class="k">CPU Temp</span>
          <span class="temp cool" id="v-cpu-temp">-</span>
        </div>
        <div class="row" style="margin-top:4px;">
          <span class="k">GPU Temp</span>
          <span class="temp cool" id="v-gpu-temp">-</span>
        </div>
      </div>
    </div>

    <!-- Pan / Tilt -->
    <div class="section" id="sec-ptz">
      <div class="section-title" onclick="toggleSection('sec-ptz')">
        Pan / Tilt <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <!-- 현재 위치 -->
        <div class="ptz-info">현재 위치 &nbsp; Pan: <span id="v-ptz-pan">-</span> &nbsp; Tilt: <span id="v-ptz-tilt">-</span></div>

        <!-- 방향 버튼 -->
        <div class="ptz-grid">
          <div></div>
          <button class="ptz-btn" id="ptz-up"    data-pan="0"  data-tilt="1">▲</button>
          <div></div>
          <button class="ptz-btn" id="ptz-left"  data-pan="-1" data-tilt="0">◀</button>
          <button class="ptz-btn stop" id="ptz-stop">■</button>
          <button class="ptz-btn" id="ptz-right" data-pan="1"  data-tilt="0">▶</button>
          <div></div>
          <button class="ptz-btn" id="ptz-down"  data-pan="0"  data-tilt="-1">▼</button>
          <div></div>
        </div>

        <!-- 저장 / 이동 -->
        <div class="ptz-saved-row">
          <div class="ptz-saved-val">저장 &nbsp; Pan: <span id="v-saved-pan">-</span> &nbsp; Tilt: <span id="v-saved-tilt">-</span></div>
          <button class="ptz-action-btn" id="btn-save-pos">현재 저장</button>
          <button class="ptz-action-btn go" id="btn-goto-pos">저장 위치로</button>
        </div>

        <div class="ptz-status-txt" id="ptz-status">대기</div>
      </div>
    </div>

  </div>
</div>

<script>
// ── 아코디언 ──────────────────────────────────────────────────────────────────
// 페이지 로드 완료 후 MJPEG 스트림 연결 (로딩 스피너 방지)
window.addEventListener("load", function() {
  document.getElementById("stream").src = "/stream";
});

function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ── 온도 클래스 ───────────────────────────────────────────────────────────────
function tempClass(c) {
  if (c >= 80) return "temp hot";
  if (c >= 60) return "temp warm";
  return "temp cool";
}

// ── Live Stream (HLS) ─────────────────────────────────────────────────────────
(function() {
  const hlsUrl = "http://" + window.location.hostname + ":8888/live/index.m3u8";
  const video  = document.getElementById("live-stream");
  function tryPlay() { video.play().catch(function() {}); }
  if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = hlsUrl;
    video.addEventListener("loadedmetadata", tryPlay);
  } else {
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/hls.js@latest";
    script.onload = function() {
      if (!Hls.isSupported()) return;
      function initHls() {
        const hls = new Hls({ liveSyncDurationCount:1, liveMaxLatencyDurationCount:3,
                               lowLatencyMode:true, backBufferLength:0 });
        hls.loadSource(hlsUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, tryPlay);
        hls.on(Hls.Events.ERROR, function(_, data) {
          if (data.fatal) { hls.destroy(); setTimeout(initHls, 3000); }
        });
      }
      initHls();
    };
    document.head.appendChild(script);
  }
})();

// ── SSE ───────────────────────────────────────────────────────────────────────
const es = new EventSource("/events");
es.onmessage = function(e) {
  const d = JSON.parse(e.data);

  document.getElementById("v-uptime").textContent = d.uptime;

  // Inference
  const isAlert = d.event_triggered === true;
  document.getElementById("result-box").className  = "result-box " + (isAlert ? "alert" : "normal");
  document.getElementById("v-raw").textContent     = d.infer_raw || "";
  document.getElementById("v-infer-time").textContent = d.infer_ms + " ms";

  // Pipeline
  document.getElementById("v-resolution").textContent = d.frame_w + " x " + d.frame_h;
  if (d.cfg_n_frames !== undefined)
    document.getElementById("v-nframes").textContent = d.cfg_n_frames;

  // Hardware
  document.getElementById("v-cpu").textContent     = d.cpu_percent + "%";
  document.getElementById("bar-cpu").style.width   = d.cpu_percent + "%";
  const ramPct = d.ram_total_mb > 0 ? ((d.ram_used_mb / d.ram_total_mb) * 100).toFixed(0) : 0;
  document.getElementById("v-ram").textContent     = d.ram_used_mb + " / " + d.ram_total_mb + " MB";
  document.getElementById("bar-ram").style.width   = ramPct + "%";
  document.getElementById("v-gpu").textContent     = d.gpu_load + "%";
  document.getElementById("bar-gpu").style.width   = d.gpu_load + "%";
  const cpuT = document.getElementById("v-cpu-temp");
  cpuT.textContent = d.cpu_temp + " C"; cpuT.className = tempClass(d.cpu_temp);
  const gpuT = document.getElementById("v-gpu-temp");
  gpuT.textContent = d.gpu_temp + " C"; gpuT.className = tempClass(d.gpu_temp);

  // PTZ 현재/저장 위치
  const fmt = function(v) { return v !== null && v !== undefined ? v.toFixed(3) : "-"; };
  document.getElementById("v-ptz-pan").textContent   = fmt(d.ptz_pan);
  document.getElementById("v-ptz-tilt").textContent  = fmt(d.ptz_tilt);
  document.getElementById("v-saved-pan").textContent  = fmt(d.ptz_saved_pan);
  document.getElementById("v-saved-tilt").textContent = fmt(d.ptz_saved_tilt);

  // Clip gallery 갱신
  if (window._checkClipCount) window._checkClipCount(d.clip_count);

  // 초기 프롬프트/트리거 동기화
  if (window._setInitialPrompt) window._setInitialPrompt(d.inference_prompt, d.trigger_keywords);
};

// ── Clip Gallery ──────────────────────────────────────────────────────────────
(function() {
  var gallery   = document.getElementById("clip-gallery");
  var searchBox = document.getElementById("clip-search");
  var btnDelSel = document.getElementById("btn-clip-del-sel");
  var btnDelAll = document.getElementById("btn-clip-del-all");
  var knownCount = -1;
  var allClips = [];     // 현재 전체 클립 데이터
  var checked = {};      // name → boolean

  function fmtTime(s) {
    if (isNaN(s)) return "0:00";
    var m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ":" + (sec < 10 ? "0" : "") + sec;
  }

  function updateDelSelBtn() {
    var n = Object.keys(checked).filter(function(k) { return checked[k]; }).length;
    btnDelSel.disabled = n === 0;
    btnDelSel.textContent = n > 0 ? "선택 삭제 (" + n + ")" : "선택 삭제";
  }

  function applyFilter() {
    var q = searchBox.value.trim().toLowerCase();
    gallery.querySelectorAll(".clip-item").forEach(function(el) {
      var name = el.dataset.name.toLowerCase();
      el.classList.toggle("hidden", q !== "" && name.indexOf(q) === -1);
    });
  }

  function deleteClips(names) {
    return fetch("/clips", {
      method: "DELETE",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({names: names})
    }).then(function(r) { return r.json(); });
  }

  function buildGallery(clips) {
    allClips = clips || [];
    gallery.innerHTML = "";
    checked = {};
    updateDelSelBtn();

    if (allClips.length === 0) {
      gallery.innerHTML = '<div class="clip-empty">녹화된 클립 없음</div>';
      return;
    }

    allClips.forEach(function(c) {
      var item = document.createElement("div");
      item.className = "clip-item";
      item.dataset.name = c.name;

      // top bar: checkbox + delete
      var topBar = document.createElement("div");
      topBar.className = "clip-top-bar";
      var chk = document.createElement("input");
      chk.type = "checkbox"; chk.className = "clip-chk";
      var delBtn = document.createElement("button");
      delBtn.className = "clip-del-btn";
      delBtn.innerHTML = "&#10005;";  // ✕
      topBar.appendChild(chk);
      topBar.appendChild(delBtn);

      // video wrapper + overlay
      var wrap = document.createElement("div");
      wrap.className = "clip-video-wrap";
      var vid = document.createElement("video");
      vid.src = "/clip/" + encodeURIComponent(c.name) + "?s=" + c.size;
      vid.preload = "metadata";
      vid.muted = true; vid.playsInline = true;
      var overlay = document.createElement("div");
      overlay.className = "clip-overlay";
      overlay.innerHTML = '<div class="clip-play-icon"></div>';
      wrap.appendChild(vid); wrap.appendChild(overlay);

      // controls bar
      var controls = document.createElement("div");
      controls.className = "clip-controls";
      var btnPlay = document.createElement("button");
      btnPlay.className = "clip-ctrl-btn";
      btnPlay.innerHTML = "&#9654;";
      var progress = document.createElement("div");
      progress.className = "clip-progress";
      var progressBar = document.createElement("div");
      progressBar.className = "clip-progress-bar";
      progress.appendChild(progressBar);
      var timeLabel = document.createElement("span");
      timeLabel.className = "clip-time"; timeLabel.textContent = "0:00";
      controls.appendChild(btnPlay);
      controls.appendChild(progress);
      controls.appendChild(timeLabel);

      // info bar
      var info = document.createElement("div");
      info.className = "clip-info";
      var nameEl = document.createElement("div");
      nameEl.className = "clip-name"; nameEl.textContent = c.name;
      info.appendChild(nameEl);

      item.appendChild(topBar);
      item.appendChild(wrap);
      item.appendChild(controls);
      item.appendChild(info);
      gallery.appendChild(item);

      // ── checkbox ──
      chk.addEventListener("change", function() {
        checked[c.name] = chk.checked;
        item.classList.toggle("checked", chk.checked);
        updateDelSelBtn();
      });

      // ── individual delete ──
      delBtn.addEventListener("click", function() {
        deleteClips([c.name]).then(function() { refreshClips(); });
      });

      // ── player interactions ──
      function togglePlay() {
        if (vid.paused) { vid.muted = false; vid.play(); }
        else { vid.pause(); }
      }
      wrap.addEventListener("click", togglePlay);
      btnPlay.addEventListener("click", togglePlay);

      vid.addEventListener("play", function() {
        overlay.classList.add("hidden");
        btnPlay.innerHTML = "&#9646;&#9646;";
      });
      vid.addEventListener("pause", function() {
        overlay.classList.remove("hidden");
        btnPlay.innerHTML = "&#9654;";
      });
      vid.addEventListener("ended", function() {
        vid.muted = true; vid.currentTime = 0;
        overlay.classList.remove("hidden");
        btnPlay.innerHTML = "&#9654;";
        progressBar.style.width = "0%";
      });
      vid.addEventListener("timeupdate", function() {
        if (vid.duration) {
          progressBar.style.width = (vid.currentTime / vid.duration * 100) + "%";
          timeLabel.textContent = fmtTime(vid.currentTime) + " / " + fmtTime(vid.duration);
        }
      });
      vid.addEventListener("loadedmetadata", function() {
        timeLabel.textContent = "0:00 / " + fmtTime(vid.duration);
      });
      progress.addEventListener("click", function(e) {
        if (vid.duration) {
          vid.currentTime = (e.offsetX / progress.offsetWidth) * vid.duration;
        }
      });
    });

    applyFilter();
  }

  // ── 검색 필터 ──
  searchBox.addEventListener("input", applyFilter);

  // ── 선택 삭제 ──
  btnDelSel.addEventListener("click", function() {
    var names = Object.keys(checked).filter(function(k) { return checked[k]; });
    if (names.length === 0) return;
    deleteClips(names).then(function() { refreshClips(); });
  });

  // ── 모두 삭제 ──
  btnDelAll.addEventListener("click", function() {
    if (allClips.length === 0) return;
    var names = allClips.map(function(c) { return c.name; });
    deleteClips(names).then(function() { refreshClips(); });
  });

  function refreshClips() {
    fetch("/clips").then(function(r) { return r.json(); }).then(buildGallery);
  }

  window._checkClipCount = function(count) {
    if (count !== knownCount) {
      knownCount = count;
      refreshClips();
    }
  };

  refreshClips();
})();

// ── Prompt ────────────────────────────────────────────────────────────────────
(function() {
  const promptInput  = document.getElementById("prompt-input");
  const triggerInput = document.getElementById("trigger-input");
  const btn          = document.getElementById("btn-apply-prompt");
  let loaded = false;

  // SSE에서 초기 동기화 (최초 1회)
  window._setInitialPrompt = function(prompt, triggers) {
    if (!loaded && (prompt || triggers)) {
      if (prompt)   promptInput.value  = prompt;
      if (triggers) triggerInput.value  = triggers;
      loaded = true;
    }
  };

  btn.addEventListener("click", function() {
    const prompt   = promptInput.value.trim();
    const triggers = triggerInput.value.trim();
    if (!prompt) return;
    fetch("/prompt", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({prompt: prompt, triggers: triggers})
    }).then(function(r) { return r.json(); }).then(function(r) {
      if (r.ok) {
        btn.textContent = "적용됨";
        setTimeout(function() { btn.textContent = "적용"; }, 1500);
      }
    });
  });

  promptInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") btn.click();
  });
  triggerInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") btn.click();
  });
})();

// ── PTZ 제어 ──────────────────────────────────────────────────────────────────
(function() {
  const SPEED  = 0.5;
  const status = document.getElementById("ptz-status");

  function ptzPost(body) {
    return fetch("/ptz", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
  }

  function startMove(btn) {
    const pan  = parseFloat(btn.dataset.pan)  * SPEED;
    const tilt = parseFloat(btn.dataset.tilt) * SPEED;
    btn.classList.add("pressing");
    status.textContent = (pan > 0 ? "→ 오른쪽" : pan < 0 ? "← 왼쪽" :
                          tilt > 0 ? "↑ 위"    : "↓ 아래") + " 이동 중";
    ptzPost({action: "move", pan: pan, tilt: tilt});
  }

  function stopMove(btn) {
    btn.classList.remove("pressing");
    status.textContent = "정지";
    ptzPost({action: "stop"});
  }

  ["ptz-up", "ptz-down", "ptz-left", "ptz-right"].forEach(function(id) {
    const btn = document.getElementById(id);
    btn.addEventListener("mousedown",  function(e) { e.preventDefault(); startMove(btn); });
    btn.addEventListener("mouseup",    function()  { stopMove(btn); });
    btn.addEventListener("mouseleave", function()  { if (btn.classList.contains("pressing")) stopMove(btn); });
    btn.addEventListener("touchstart", function(e) { e.preventDefault(); startMove(btn); }, {passive: false});
    btn.addEventListener("touchend",   function()  { stopMove(btn); });
  });

  document.getElementById("ptz-stop").addEventListener("click", function() {
    status.textContent = "강제 정지";
    ptzPost({action: "stop"});
  });

  // 현재 위치 저장
  document.getElementById("btn-save-pos").addEventListener("click", function() {
    status.textContent = "저장 중...";
    ptzPost({action: "save"}).then(function(r) { return r.json(); }).then(function(r) {
      status.textContent = r.ok ? "저장 완료" : "저장 실패 (위치 미확인)";
    });
  });

  // 저장 위치로 이동
  document.getElementById("btn-goto-pos").addEventListener("click", function() {
    status.textContent = "이동 중...";
    ptzPost({action: "goto"}).then(function(r) { return r.json(); }).then(function(r) {
      status.textContent = r.ok ? "이동 완료" : "저장된 위치 없음";
    });
  });
})();
</script>
