name: babycat-web

services:

  web:
    image: babycat-web
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
      - VITE_BABYCAT_HOST=${VITE_BABYCAT_HOST:?required}
    ports:
      - "5173:5173"    # Vite 개발 서버입니다.
    volumes:
      - .:/app         # HMR을 위해 web/ 디렉토리를 실시간 마운트합니다. node_modules는 ./node_modules 아래에 생성됩니다.
    networks:
      - babycat

networks:
  babycat:
    name: babycat_default
    external: true
