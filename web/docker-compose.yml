name: babycat-web

services:

  web:
    image: babycat-web
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: babycat-web
    restart: unless-stopped
    ports:
      - "5173:5173"    # Vite dev server
    volumes:
      - .:/app         # live-mount for HMR (web/ 자체). node_modules는 ./node_modules에 생성
    networks:
      - babycat

networks:
  babycat:
    name: babycat
    external: true
