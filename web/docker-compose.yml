name: babycat-web

services:

  web:
    image: babycat-web
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: babycat-web
    restart: unless-stopped
    ports:
      - "5173:5173"    # @claude Vite dev server.
    volumes:
      - .:/app         # @claude Live-mount for HMR (web/ itself). node_modules lands under ./node_modules.
    networks:
      - babycat

networks:
  babycat:
    name: babycat
    external: true
