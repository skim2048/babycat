name: babycat-debug

services:

  web:
    build:
      context: ..
      dockerfile: docker/debugging/Dockerfile
    container_name: babycat-web
    restart: unless-stopped
    ports:
      - "5173:5173"    # Vite dev server
    volumes:
      - .:/app         # live-mount for HMR (debugging/ 자체)
      - /app/node_modules  # anonymous volume — 컨테이너 내부 node_modules 보존
    networks:
      - babycat

networks:
  babycat:
    name: babycat
    external: true
