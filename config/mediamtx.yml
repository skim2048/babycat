###############################################
# MediaMTX configuration for Babycat
###############################################

# Log level
logLevel: info

# API server (App 컨테이너가 런타임에 RTSP 소스를 설정)
api: yes
apiAddress: :9997

# API 접근 허용 (컨테이너 간 통신)
authInternalUsers:
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback

# RTSP server
rtspAddress: :8554

# SRT 미사용 — 포트 8890 충돌 방지
srt: no

# WebRTC server
webrtcAddress: :8889
webrtcAdditionalHosts:
  - 172.27.1.205
webrtcLocalUDPAddress: :8890

paths:
  live:
    # Source is configured at runtime via API from the app container
    # (카메라 자격증명은 프론트엔드에서 입력 → App이 API로 설정)

    # Segment recording for event clip storage (OI-06)
    # Segments are stored on shared volume; App preserves relevant segments on event detection
    record: yes
    recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S
    recordFormat: fmp4
    recordSegmentDuration: 10s
    recordDeleteAfter: 2h
