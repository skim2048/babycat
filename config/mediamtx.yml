###############################################
# @claude MediaMTX configuration for Babycat.
###############################################

# @claude Log level.
logLevel: info

# @claude API server (the App container configures the RTSP source at runtime).
api: yes
apiAddress: :9997

# @claude Allow API access (for inter-container traffic).
authInternalUsers:
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback

# @claude RTSP server.
rtspAddress: :8554

# @claude SRT not used — avoids a port 8890 conflict.
srt: no

# @claude WebRTC server.
webrtcAddress: :8889
# @claude webrtcAdditionalHosts: extra host IPs/names to advertise as ICE candidates.
# @claude Containers cannot see the host NIC, so docker-compose injects
# @claude MTX_WEBRTCADDITIONALHOSTS=${HOST_IP} (from .env).
webrtcLocalUDPAddress: :8890

paths:
  live:
    # @claude Source is configured at runtime via API from the app container.
    # @claude (Camera credentials are entered in the frontend; the app sets them via the API.)
    # @claude Event clips are re-recorded directly from RTSP by the app container via ffmpeg
    # @claude — mediamtx segments are not used.
