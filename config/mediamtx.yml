###############################################
# MediaMTX configuration for Babycat
###############################################

# Log level
logLevel: info

# API server (App 컨테이너가 런타임에 RTSP 소스를 설정)
api: yes
apiAddress: :9997

# API 접근 허용 (컨테이너 간 통신)
authInternalUsers:
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback

# RTSP server
rtspAddress: :8554

# SRT 미사용 — 포트 8890 충돌 방지
srt: no

# WebRTC server
webrtcAddress: :8889
# webrtcAdditionalHosts: ICE candidate로 광고할 추가 호스트 IP/이름.
# 컨테이너에서 호스트 NIC를 직접 볼 수 없으므로 docker-compose가 환경변수
# MTX_WEBRTCADDITIONALHOSTS=${HOST_IP}로 주입한다 (.env 의 HOST_IP).
webrtcLocalUDPAddress: :8890

paths:
  live:
    # Source is configured at runtime via API from the app container
    # (카메라 자격증명은 프론트엔드에서 입력 → App이 API로 설정)
    # 이벤트 클립은 app 컨테이너가 ffmpeg로 RTSP에서 직접 재녹화한다 (mediamtx 세그먼트 미사용).
