services:

  babycat-mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: babycat-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC HTTP
      - "8890:8890/udp"  # WebRTC ICE
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - babycat

  app:
    image: babycat-app
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: babycat-app
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8080:8080"   # Debug web UI
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # NVIDIA GStreamer plugins are mounted from host (see volumes below)
      - GST_PLUGIN_PATH=/usr/lib/aarch64-linux-gnu/gstreamer-1.0
      - LD_LIBRARY_PATH=/usr/local/lib/python3.10/dist-packages/tvm:/usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu
      # JWT мқёмҰқ (api м»Ён…Ңмқҙл„ҲмҷҖ лҸҷмқјн•ң мӢңнҒ¬лҰҝ мӮ¬мҡ©)
      - JWT_SECRET=${JWT_SECRET:-babycat-default-secret}
      # FCM м•ҢлҰј (лҜём„Өм • мӢң лЎңк·ё м¶ңл Ҙл§Ң)
      # FCM нҷңм„ұнҷ” л°©лІ•:
      #   1. Firebase Consoleм—җм„ң service account JSON нӮӨ л°ңкёү вҶ’ config/fcm_credentials.json м ҖмһҘ
      #   2. м•„лһҳ л‘җ мӨ„ мЈјм„қ н•ҙм ң нӣ„ FCM_TOKEN к°’ мһ…л Ҙ
      #   3. volumes м„№м…ҳмқҳ fcm_credentials л§ҲмҡҙнҠёлҸ„ мЈјм„қ н•ҙм ң
      #- FCM_CREDENTIALS=/run/fcm/credentials.json
      #- FCM_TOKEN=<кё°кё°_FCM_л“ұлЎқ_нҶ нҒ°>
    group_add:
      - video                                                       # /dev/nvmapмқҖ video к·ёлЈ№(GID 44) мҶҢмң  вҖ” NrRmMemInitNvmap м ‘к·ј н•„мҲҳ
    devices:
      - /dev/v4l2-nvdec                                             # HW л№„л””мҳӨ л””мҪ”лҚ” (Orin NX)
      - /dev/v4l2-nvenc                                             # HW л№„л””мҳӨ мқёмҪ”лҚ” (Orin NX)
      - /dev/nvmap                                                  # GPU л©”лӘЁлҰ¬ кҙҖлҰ¬мһҗ (nvv4l2decoder н•„мҲҳ)
      - /dev/nvhost-ctrl-gpu                                        # GPU м ңм–ҙ
      - /dev/nvhost-gpu                                             # GPU мұ„л„җ
    volumes:
      - ./data/models:/data/models                                 # NanoLLM model cache (MLC compiled). н”„лЎңм қнҠё мҷёл¶Җ кІҪлЎң кёҲм§Җ (мқҙмӢқм„ұ).
      #- ./config/fcm_credentials.json:/run/fcm/credentials.json:ro # FCM нҷңм„ұнҷ” мӢң мЈјм„қ н•ҙм ң
      - ./app:/app                                                  # live-mount source for development
      - ./config:/config                                              # camera.json, ptz_home.txt
      - ./data:/data                                                  # нҒҙлҰҪ м ҖмһҘ ({YYYY}/{MM}/*.mp4)
      # Host NVIDIA GStreamer plugins & tegra libs (build-time install not possible)
      - /usr/lib/aarch64-linux-gnu/gstreamer-1.0:/usr/lib/aarch64-linux-gnu/gstreamer-1.0:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu/nvidia:ro
      - /tmp/nvscsock:/tmp/nvscsock                                 # NvSciIPC лҚ°лӘ¬ мҶҢмј“ вҖ” NvMMLite HW кІҪлЎң н•„мҲҳ (м—Ҷмңјл©ҙ cuvidv4l2лЎң нҸҙл°ұ нӣ„ CUDA_GPU_ID EINVAL)
    ipc: host      # NvSciIPC uses POSIX shm/mqueue on host IPC namespace
    depends_on:
      - babycat-mediamtx
    networks:
      - babycat

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: babycat-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CAM_DIR=/data
      - DB_PATH=/data/db/babycat.db
      - JWT_SECRET=${JWT_SECRET:-babycat-default-secret}
      - DEFAULT_USER=${DEFAULT_USER:-admin}
      - DEFAULT_PASS=${DEFAULT_PASS:-admin}
    volumes:
      - ./data:/data                          # нҒҙлҰҪ м ҖмһҘ ({YYYY}/{MM}/*.mp4) + SQLite
    depends_on:
      - app
    networks:
      - babycat


networks:
  babycat:
    name: babycat
    driver: bridge
