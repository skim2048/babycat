name: babycat

services:

  mtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
      # 브라우저 클라이언트가 MediaMTX의 WebRTC 스트림에 접속할 수 있도록
      # .env의 HOST_IP를 MediaMTX가 광고하는 ICE 후보에 추가한다.
      - MTX_WEBRTCADDITIONALHOSTS=${HOST_IP:?required}
    ports:
      # RTSP(8554)는 호스트에 공개하지 않는다. App Server는 Docker 내부
      # 네트워크(mtx:8554)로 접근하며, 외부 RTSP 접점은 존재하지 않는다.
      - "8888:8888"      # HLS → (Client App)
      - "8889:8889"      # WebRTC HTTP → (Client App)
      - "8890:8890/udp"  # WebRTC ICE → (Client App)
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml:ro

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: babycat-app
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8080:8080"   # App HTTP API
    environment:
      - TZ=Asia/Seoul
      - TRIGGER_ROLLOVER_ENABLED=1
      - TRIGGER_SEGMENT_DIR=/run/babycat-segments/live
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GST_PLUGIN_PATH=/usr/lib/aarch64-linux-gnu/gstreamer-1.0
      - LD_LIBRARY_PATH=/usr/local/lib/python3.10/dist-packages/tvm:/usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu
      - JWT_SECRET=${JWT_SECRET:?required}
      - VLM_MODELS=${VLM_MODELS:?required}
      - MAX_NEW_TOKENS=${MAX_NEW_TOKENS:-32}
      # 카메라 프로필은 런타임 상태이므로 Storage(/data) 아래에 둔다(SRS 2.2).
      - CONFIG_PATH=/data/config/cam_profile.json
      # FCM 알림 설정입니다. 값이 없으면 알림을 보내지 않고 로그만 남깁니다.
      # FCM 활성화 절차:
      #   1. Firebase 콘솔에서 서비스 계정 JSON 키를 발급하고 config/fcm_credentials.json에 저장합니다.
      #   2. 아래 두 줄의 주석을 해제하고 FCM_TOKEN을 설정합니다.
      #   3. volumes 항목에서 fcm_credentials 마운트의 주석도 해제합니다.
      #- FCM_CREDENTIALS=/run/fcm/credentials.json
      #- FCM_TOKEN=<device_fcm_registration_token>
    group_add:
      - video
    devices:
      - /dev/v4l2-nvdec  # 하드웨어 비디오 디코더입니다(Orin NX).
      - /dev/v4l2-nvenc  # 하드웨어 비디오 인코더입니다(Orin NX).
      - /dev/nvmap            # GPU 메모리 관리자이며, nvv4l2decoder에 필요합니다.
      - /dev/nvhost-ctrl-gpu  # GPU 제어 장치입니다.
      - /dev/nvhost-gpu       # GPU 채널 장치입니다.
    volumes:
      - ./data/models:/data/models # NanoLLM 모델 캐시입니다(MLC 컴파일 결과). 이식성을 위해 프로젝트 트리 안에 유지해야 합니다.
      #- ./config/fcm_credentials.json:/run/fcm/credentials.json:ro # FCM을 활성화할 때 주석을 해제합니다.
      - ./app:/app
      - ./data:/data
      # 호스트의 NVIDIA GStreamer 플러그인과 tegra 라이브러리를 마운트합니다. 이미지 빌드 시점에는 설치할 수 없습니다.
      - /usr/lib/aarch64-linux-gnu/gstreamer-1.0:/usr/lib/aarch64-linux-gnu/gstreamer-1.0:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu/nvidia:ro
      - /tmp/nvscsock:/tmp/nvscsock # NvSciIPC 데몬 소켓입니다. NvMMLite 하드웨어 경로에 필요하며, 없으면 cuvidv4l2로 폴백한 뒤 CUDA_GPU_ID EINVAL 오류로 실패합니다.
    tmpfs:
      - /run/babycat-segments:size=64m,mode=1777
    ipc: host      # NvSciIPC가 호스트 IPC 네임스페이스의 POSIX shm/mqueue를 사용합니다.
    depends_on:
      - mtx

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: babycat-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Seoul
      - CAM_DIR=/data
      - DB_PATH=/data/db/babycat.db
      - JWT_SECRET=${JWT_SECRET:?required}
      - JWT_EXPIRY=${JWT_EXPIRY:?required}
      - REFRESH_EXPIRY=${REFRESH_EXPIRY:?required}
      - DEFAULT_USER=${DEFAULT_USER:?required}
      - DEFAULT_PASS=${DEFAULT_PASS:?required}
    volumes:
      - ./data:/data
    depends_on:
      - app
