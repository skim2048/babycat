services:

  babycat-mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: babycat-mediamtx
    restart: unless-stopped
    environment:
      # @claude Host IP advertised as a WebRTC ICE candidate (HOST_IP from .env).
      # @claude Containers cannot see the host NIC, so it must be injected. Comma-separated list supported.
      - MTX_WEBRTCADDITIONALHOSTS=${HOST_IP:-}
    ports:
      - "8554:8554"   # @claude RTSP
      - "8888:8888"   # @claude HLS
      - "8889:8889"   # @claude WebRTC HTTP
      - "8890:8890/udp"  # @claude WebRTC ICE
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - babycat

  app:
    image: babycat-app
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: babycat-app
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8080:8080"   # @claude Debug web UI.
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # @claude NVIDIA GStreamer plugins are mounted from the host (see volumes below).
      - GST_PLUGIN_PATH=/usr/lib/aarch64-linux-gnu/gstreamer-1.0
      - LD_LIBRARY_PATH=/usr/local/lib/python3.10/dist-packages/tvm:/usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu
      # @claude JWT auth (shares the secret with the api container).
      - JWT_SECRET=${JWT_SECRET:-babycat-default-secret}
      # @claude Candidate VLM model list (comma-separated). The first entry is the boot default.
      - VLM_MODELS=${VLM_MODELS:-Efficient-Large-Model/VILA1.5-3b}
      # @claude FCM notifications (when unset, only logs).
      # @claude Enabling FCM:
      # @claude   1. In the Firebase console, mint a service-account JSON key and save to config/fcm_credentials.json.
      # @claude   2. Uncomment the two lines below and set FCM_TOKEN.
      # @claude   3. Uncomment the matching fcm_credentials mount in the volumes section.
      #- FCM_CREDENTIALS=/run/fcm/credentials.json
      #- FCM_TOKEN=<device_fcm_registration_token>
    group_add:
      - video                                                       # @claude /dev/nvmap is owned by the video group (GID 44); NrRmMemInitNvmap needs access.
    devices:
      - /dev/v4l2-nvdec                                             # @claude HW video decoder (Orin NX).
      - /dev/v4l2-nvenc                                             # @claude HW video encoder (Orin NX).
      - /dev/nvmap                                                  # @claude GPU memory manager (required by nvv4l2decoder).
      - /dev/nvhost-ctrl-gpu                                        # @claude GPU control.
      - /dev/nvhost-gpu                                             # @claude GPU channel.
    volumes:
      - ./data/models:/data/models                                 # @claude NanoLLM model cache (MLC compiled). Must stay inside the project tree (portability).
      #- ./config/fcm_credentials.json:/run/fcm/credentials.json:ro # @claude Uncomment when FCM is enabled.
      - ./app:/app                                                  # @claude Live-mount source for development.
      - ./config:/config                                              # @claude camera.json, ptz_home.txt
      - ./data:/data                                                  # @claude Clip storage ({YYYY}/{MM}/*.mp4).
      # @claude Host NVIDIA GStreamer plugins + tegra libs (cannot be installed at image build time).
      - /usr/lib/aarch64-linux-gnu/gstreamer-1.0:/usr/lib/aarch64-linux-gnu/gstreamer-1.0:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu/nvidia:ro
      - /tmp/nvscsock:/tmp/nvscsock                                 # @claude NvSciIPC daemon socket — NvMMLite HW path requires it (otherwise falls back to cuvidv4l2 and fails with CUDA_GPU_ID EINVAL).
    ipc: host      # @claude NvSciIPC uses POSIX shm/mqueue on the host IPC namespace.
    depends_on:
      - babycat-mediamtx
    networks:
      - babycat

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: babycat-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CAM_DIR=/data
      - DB_PATH=/data/db/babycat.db
      - JWT_SECRET=${JWT_SECRET:-babycat-default-secret}
      - JWT_EXPIRY=${JWT_EXPIRY:-600}
      - DEFAULT_USER=${DEFAULT_USER:-admin}
      - DEFAULT_PASS=${DEFAULT_PASS:-admin}
    volumes:
      - ./data:/data                          # @claude Clip storage ({YYYY}/{MM}/*.mp4) + SQLite.
    depends_on:
      - app
    networks:
      - babycat


networks:
  babycat:
    name: babycat
    driver: bridge
